<!-- 
  GWealth Nation - Newsletter CTA Section
  Objective: High-conversion newsletter signup section matching the design system with LIVE backend API integration.
-->
<div id="gw-blog-cta">
    <style>
        /* --- SCOPED CSS NAMESPACE --- */
        #gw-blog-cta {
            position: relative;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            padding: 80px 0;
            background-color: #27267d; /* Primary Blue */
            color: #ffffff;
            font-family: 'Lexend', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #gw-blog-cta * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Container */
        #gw-blog-cta .gw-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 5%;
            position: relative;
            z-index: 2;
        }

        /* Typography */
        #gw-blog-cta .gw-cta-icon {
            font-size: 32px;
            color: #D4AF37; /* Gold */
            margin-bottom: 24px;
        }

        #gw-blog-cta .gw-cta-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        @media (min-width: 768px) {
            #gw-blog-cta .gw-cta-title {
                font-size: 40px;
            }
        }

        #gw-blog-cta .gw-cta-subtitle {
            font-size: 16px;
            color: #e5eeff;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Form */
        #gw-blog-cta .gw-newsletter-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        @media (min-width: 640px) {
            #gw-blog-cta .gw-newsletter-form {
                flex-direction: row;
            }
        }

        #gw-blog-cta .gw-input {
            flex-grow: 1;
            padding: 16px 24px;
            border: 2px solid transparent;
            border-radius: 4px; /* Strict 4px Limit */
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            color: #1e293b;
        }

        #gw-blog-cta .gw-input:focus {
            border-color: #D4AF37;
        }

        #gw-blog-cta .gw-btn-submit {
            background-color: #bb001b; /* Crimson Red */
            color: #ffffff;
            border: none;
            border-radius: 4px; /* Strict 4px Limit */
            padding: 16px 32px;
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        #gw-blog-cta .gw-btn-submit:hover {
            background-color: #e02830;
        }

        #gw-blog-cta .gw-btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Status Message Styles */
        #gw-blog-cta .gw-cta-status {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #gw-blog-cta .gw-cta-status.show { opacity: 1; }
        #gw-blog-cta .gw-cta-status.success { color: #34d399; } /* Green */
        #gw-blog-cta .gw-cta-status.error { color: #f87171; } /* Red */

        /* Decorative Elements */
        #gw-blog-cta .gw-deco-circle-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background-color: rgba(212, 175, 55, 0.05);
            z-index: 1;
        }

        #gw-blog-cta .gw-deco-circle-2 {
            position: absolute;
            bottom: -150px;
            right: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.03);
            z-index: 1;
        }
    </style>

    <!-- FontAwesome (Assumes Elementor has it loaded) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <div class="gw-deco-circle-1"></div>
    <div class="gw-deco-circle-2"></div>

    <div class="gw-container">
        <i class="fa-regular fa-envelope-open gw-cta-icon"></i>
        <h2 class="gw-cta-title">Don't Miss Out on Market Updates</h2>
        <p class="gw-cta-subtitle">Join over 5,000 investors receiving exclusive insights, property alerts, and expert analysis directly to their inbox.</p>
        
        <form id="gw-blog-newsletter-form" class="gw-newsletter-form">
            <input type="email" id="gw-blog-nl-email" class="gw-input" placeholder="Enter your email address" required>
            <button type="submit" id="gw-blog-nl-submit" class="gw-btn-submit">Subscribe Now</button>
        </form>

        <div id="gw-blog-nl-status" class="gw-cta-status"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('gw-blog-newsletter-form');
            const emailInput = document.getElementById('gw-blog-nl-email');
            const submitBtn = document.getElementById('gw-blog-nl-submit');
            const statusDiv = document.getElementById('gw-blog-nl-status');

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = emailInput.value.trim();
                    if (!email) return;

                    // Loading State
                    const originalBtnText = submitBtn.innerText;
                    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
                    submitBtn.disabled = true;
                    statusDiv.className = 'gw-cta-status'; 
                    statusDiv.innerText = '';

                    try {
                        // Using the global environment variable set up via WPCode
                        const apiUrl = window.GW_API_URL || 'https://api.gwealthrepublic.com';
                        const response = await fetch(`${apiUrl}/subscribers`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email })
                        });
                        
                        const data = await response.json();

                        if (response.ok && data.success) {
                            form.reset();
                            statusDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i> ' + data.message;
                            statusDiv.className = 'gw-cta-status show success';
                        } else {
                            throw new Error(data.message || 'Subscription failed');
                        }

                    } catch (error) {
                        console.error('Newsletter Error:', error);
                        statusDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + error.message;
                        statusDiv.className = 'gw-cta-status show error';
                    } finally {
                        submitBtn.innerText = originalBtnText;
                        submitBtn.disabled = false;
                        
                        // Hide status after 5 seconds if success
                        if (statusDiv.classList.contains('success')) {
                            setTimeout(() => {
                                statusDiv.classList.remove('show');
                            }, 5000);
                        }
                    }
                });
            }
        });
    </script>
</div>
