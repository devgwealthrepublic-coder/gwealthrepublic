<!-- 
  GWealth Nation - Blog Page Section 2: Post Grid
-->
<div id="gw-blog-grid-section">
    <style>
        /* --- SCOPED CSS NAMESPACE --- */
        #gw-blog-grid-section {
            position: relative;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            padding: 64px 0;
            background-color: #f8f9fa; /* Light surface */
            font-family: 'Lexend', sans-serif;
            overflow: hidden;
        }

        #gw-blog-grid-section * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        #gw-blog-grid-section .gw-container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* Filter & Search Header */
        #gw-blog-grid-section .gw-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 16px;
            flex-wrap: wrap;
        }

        #gw-blog-grid-section .gw-search-wrap {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        #gw-blog-grid-section .gw-search-input {
            width: 100%;
            padding: 14px 20px 14px 44px;
            border: 1px solid #E2E8F0;
            border-radius: 4px; /* Strict 4px Limit */
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        #gw-blog-grid-section .gw-search-input:focus {
            border-color: #27267d;
            box-shadow: 0 0 0 3px rgba(39, 38, 125, 0.1);
        }

        #gw-blog-grid-section .gw-search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #718096;
        }

        /* Grid Layout */
        #gw-blog-grid-section .gw-posts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            min-height: 400px;
        }

        @media (min-width: 768px) {
            #gw-blog-grid-section .gw-posts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            #gw-blog-grid-section .gw-posts-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Post Card */
        #gw-blog-grid-section .gw-post-card {
            background-color: #ffffff;
            border-radius: 4px; /* Strict 4px Limit */
            overflow: hidden;
            box-shadow: 0px 4px 16px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(30, 27, 75, 0.05);
            text-decoration: none;
            color: inherit;
        }

        #gw-blog-grid-section .gw-post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0px 16px 32px rgba(0, 0, 0, 0.08);
        }

        /* Card Image */
        #gw-blog-grid-section .gw-card-image-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            overflow: hidden;
            background-color: #e2e8f0;
        }

        #gw-blog-grid-section .gw-card-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        #gw-blog-grid-section .gw-post-card:hover .gw-card-image {
            transform: scale(1.05);
        }

        #gw-blog-grid-section .gw-category-badge {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background-color: #27267d; /* Primary Blue */
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 4px; /* Strict 4px Limit */
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
        }

        /* Card Body */
        #gw-blog-grid-section .gw-card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        #gw-blog-grid-section .gw-card-date {
            font-size: 12px;
            color: #718096;
            margin-bottom: 12px;
            font-weight: 500;
        }

        #gw-blog-grid-section .gw-card-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1E1B4B;
            line-height: 1.4;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #gw-blog-grid-section .gw-card-excerpt {
            font-size: 14px;
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 24px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #gw-blog-grid-section .gw-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #edf2f7;
            padding-top: 16px;
        }

        #gw-blog-grid-section .gw-read-more {
            font-size: 13px;
            font-weight: 600;
            color: #bb001b; /* Crimson Red */
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: gap 0.2s ease;
        }

        #gw-blog-grid-section .gw-author-avatar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #gw-blog-grid-section .gw-avatar-circle {
            width: 28px;
            height: 28px;
            background-color: #27267d; /* Primary Blue */
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0.5px;
        }

        #gw-blog-grid-section .gw-author-name {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }

        #gw-blog-grid-section .gw-post-card:hover .gw-read-more {
            gap: 8px;
        }

        /* Load More Button */
        #gw-blog-grid-section .gw-load-more-wrap {
            text-align: center;
            margin-top: 48px;
        }

        #gw-blog-grid-section .gw-btn-load-more {
            background-color: #1E1B4B; /* Legal Ink */
            color: #ffffff;
            border: none;
            border-radius: 4px; /* Strict 4px Limit */
            padding: 14px 32px;
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        #gw-blog-grid-section .gw-btn-load-more:hover {
            background-color: #27267d; /* Primary Blue */
        }

        #gw-blog-grid-section .gw-state-message {
            text-align: center;
            padding: 48px 24px;
            color: #718096;
            font-size: 16px;
            grid-column: 1 / -1;
        }

        /* FontAwesome for Icons (Assuming it's loaded by Elementor, but providing fallback structure) */
    </style>

    <div class="gw-container">
        
        <!-- Header / Search -->
        <div class="gw-grid-header">
            <div class="gw-search-wrap">
                <i class="fa-solid fa-magnifying-glass gw-search-icon"></i>
                <input type="text" id="gw-blog-search" class="gw-search-input" placeholder="Search insights, market trends...">
            </div>
        </div>

        <!-- Grid -->
        <div class="gw-posts-grid" id="gw-blog-grid">
            <div class="gw-state-message">Fetching the latest insights...</div>
        </div>

        <!-- Load More -->
        <div class="gw-load-more-wrap" id="gw-blog-load-more" style="display: none;">
            <button class="gw-btn-load-more" id="gw-blog-load-btn">Load More Posts</button>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridEl = document.getElementById('gw-blog-grid');
            const loadBtn = document.getElementById('gw-blog-load-btn');
            const loadWrap = document.getElementById('gw-blog-load-more');
            const searchInput = document.getElementById('gw-blog-search');

            let currentPage = 1;
            let totalPages = 1;
            let currentSearch = '';
            let isFetching = false;

            // Fallback Images if a post doesn't have a featured image
            const fallbackImages = [
                'https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=800&q=80',
                'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=800&q=80',
                'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'
            ];

            const fetchPosts = async (reset = false) => {
                if (isFetching) return;
                isFetching = true;

                if (reset) {
                    currentPage = 1;
                    gridEl.innerHTML = '<div class="gw-state-message">Fetching the latest insights...</div>';
                    loadWrap.style.display = 'none';
                } else {
                    loadBtn.innerText = 'Loading...';
                }

                try {
                    // WordPress REST API: Fetch Posts with embedded featured media and author
                    const baseUrl = 'http://gwealthrepublic.local/wp-json/wp/v2/posts';
                    const params = new URLSearchParams({
                        _embed: 'true',
                        per_page: 6,
                        page: currentPage
                    });

                    if (currentSearch) {
                        params.append('search', currentSearch);
                    }

                    const response = await fetch(`${baseUrl}?${params.toString()}`);
                    
                    if (!response.ok) {
                        throw new Error(`API returned ${response.status}`);
                    }

                    const posts = await response.json();
                    
                    // Get total pages from WP Header
                    const totalPagesHeader = response.headers.get('X-WP-TotalPages');
                    if (totalPagesHeader) {
                        totalPages = parseInt(totalPagesHeader, 10);
                    }

                    renderPosts(posts, reset);
                } catch (error) {
                    console.error('Error fetching blog posts:', error);
                    if (reset) {
                        gridEl.innerHTML = '<div class="gw-state-message" style="color: #ef4444;">Unable to load insights at this time. Please try again later.</div>';
                    }
                } finally {
                    isFetching = false;
                    loadBtn.innerText = 'Load More Posts';
                }
            };

            const renderPosts = (posts, reset) => {
                if (reset) gridEl.innerHTML = '';

                if (posts.length === 0 && reset) {
                    gridEl.innerHTML = '<div class="gw-state-message">No posts found matching your search.</div>';
                    loadWrap.style.display = 'none';
                    return;
                }

                posts.forEach(post => {
                    // Extract Date
                    const dateOpts = { year: 'numeric', month: 'long', day: 'numeric' };
                    const formattedDate = new Date(post.date).toLocaleDateString('en-US', dateOpts);

                    // Extract Image
                    let imageUrl = fallbackImages[Math.floor(Math.random() * fallbackImages.length)];
                    if (post._embedded && post._embedded['wp:featuredmedia'] && post._embedded['wp:featuredmedia'][0]) {
                        imageUrl = post._embedded['wp:featuredmedia'][0].source_url;
                    }

                    // Extract Category
                    let categoryName = 'News';
                    if (post._embedded && post._embedded['wp:term'] && post._embedded['wp:term'][0] && post._embedded['wp:term'][0].length > 0) {
                        categoryName = post._embedded['wp:term'][0][0].name;
                    }

                    // Extract Author
                    let authorName = 'GWealth Admin';
                    if (post._embedded && post._embedded['author'] && post._embedded['author'][0] && post._embedded['author'][0].name) {
                        authorName = post._embedded['author'][0].name;
                    }

                    // Extract Initials
                    let initials = 'GW';
                    if (authorName) {
                        const parts = authorName.split(' ');
                        if (parts.length > 1) {
                            initials = (parts[0][0] + parts[1][0]).toUpperCase();
                        } else {
                            initials = parts[0].substring(0, 2).toUpperCase();
                        }
                    }

                    // Clean Excerpt (Remove WP <p> tags)
                    let excerpt = post.excerpt.rendered.replace(/<\/?[^>]+(>|$)/g, "");

                    const cardHTML = `
                        <a href="${post.link}" class="gw-post-card">
                            <div class="gw-card-image-wrap">
                                <img src="${imageUrl}" alt="${post.title.rendered}" class="gw-card-image" loading="lazy" />
                                <div class="gw-category-badge">${categoryName}</div>
                            </div>
                            <div class="gw-card-body">
                                <div class="gw-card-date">${formattedDate}</div>
                                <h3 class="gw-card-title">${post.title.rendered}</h3>
                                <p class="gw-card-excerpt">${excerpt}</p>
                                <div class="gw-card-footer">
                                    <div class="gw-author-avatar">
                                        <div class="gw-avatar-circle">${initials}</div>
                                        <span class="gw-author-name">${authorName}</span>
                                    </div>
                                    <span class="gw-read-more">Read Article <i class="fa-solid fa-arrow-right-long"></i></span>
                                </div>
                            </div>
                        </a>
                    `;
                    gridEl.insertAdjacentHTML('beforeend', cardHTML);
                });

                // Handle Load More visibility
                if (currentPage < totalPages) {
                    loadWrap.style.display = 'block';
                } else {
                    loadWrap.style.display = 'none';
                }
            };

            // Event Listeners
            if (loadBtn) {
                loadBtn.addEventListener('click', () => {
                    currentPage++;
                    fetchPosts(false);
                });
            }

            if (searchInput) {
                let debounceTimer;
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        currentSearch = e.target.value;
                        fetchPosts(true);
                    }, 500);
                });
            }

            // Initial Fetch
            fetchPosts(true);
        });
    </script>
</div>
