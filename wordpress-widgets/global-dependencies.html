<!-- 1. HIGH-PERFORMANCE INSTANT PRELOADER MARKUP & STYLING (Blocks FOUC) -->
<div id="gw-preloader">
    <div class="gw-preloader-spinner-wrapper">
        <div class="gw-preloader-spinner"></div>
        <div class="gw-preloader-logo-text">G-WEALTH</div>
        <div class="gw-preloader-badge">SECURE LAND OWNERSHIP</div>
    </div>
</div>

<style>
    /* Immediate render-blocking preloader layout */
    #gw-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f8f9ff;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
    }
    
    #gw-preloader.gw-preloader-fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .gw-preloader-spinner-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    /* Spinning Vault-Shield design - Strictly respecting the 4px border limit where applicable */
    .gw-preloader-spinner {
        width: 44px;
        height: 44px;
        border: 4px solid #e5eeff;
        border-top: 4px solid #27267d;      /* Primary Blue */
        border-right: 4px solid #D4AF37;    /* Verified Gold */
        border-radius: 50%;                 /* Allowed circular exception */
        animation: gw-spin 0.8s linear infinite;
        margin-bottom: 16px;
    }

    .gw-preloader-logo-text {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 20px;
        color: #27267d;
        letter-spacing: -0.02em;
        margin: 0;
        line-height: 1.2;
    }

    .gw-preloader-badge {
        font-family: 'Lexend', system-ui, -apple-system, sans-serif;
        font-weight: 500;
        font-size: 9px;
        color: #D4AF37;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-top: 6px;
        background-color: rgba(39, 38, 125, 0.05); /* #27267d/5 equivalent */
        padding: 4px 10px;
        border-radius: 4px; /* Strict 4px limit */
        border: 1px solid rgba(212, 175, 55, 0.15);
    }

    @keyframes gw-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<script>
    (() => {
        // Safe, early execution IIFE to run fade-out routine
        const hidePreloader = () => {
            const preloader = document.getElementById('gw-preloader');
            if (preloader && !preloader.classList.contains('gw-preloader-fade-out')) {
                preloader.classList.add('gw-preloader-fade-out');
                // Remove preloader element completely from DOM after animation to free up layout memory
                setTimeout(() => {
                    preloader.remove();
                }, 400);
            }
        };

        // Dismiss preloader once the browser confirms all images and CSS are parsed
        window.addEventListener('load', hidePreloader);

        // Safety Fallback: Automatically dismiss the preloader after 3 seconds if slow network drops connection
        setTimeout(hidePreloader, 3000);
    })();
</script>

<!-- 8. GLOBAL ENVIRONMENT CONFIGURATION -->
<script>
    (() => {
        // Automatically detect if we are running locally or on the live server
        window.GW_ENV = window.location.hostname.includes('.local') || window.location.hostname === 'localhost' ? 'local' : 'production';
        window.GW_PORTAL_URL = window.GW_ENV === 'local' ? 'http://localhost:5173' : 'https://portal.gwealthrepublic.com';
        window.GW_API_URL = window.GW_ENV === 'local' ? 'http://localhost:5000/api' : 'https://gwealth-backend.onrender.com/api';

        // Helper function to rewrite HTML links dynamically based on environment
        document.addEventListener('DOMContentLoaded', () => {
            if (window.GW_ENV === 'local') {
                // If running locally, automatically patch live portal links back to localhost
                document.querySelectorAll('a[href^="https://portal.gwealthrepublic.com"]').forEach(link => {
                    link.href = link.href.replace('https://portal.gwealthrepublic.com', window.GW_PORTAL_URL);
                });
            }
        });
    })();
</script>
