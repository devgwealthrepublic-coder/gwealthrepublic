<!-- 
  GWealth Nation - Blog Page Section 3: CTA / Newsletter
  Objective: High-conversion newsletter signup section matching the design system.
  Instructions: Paste this block into an Elementor Custom HTML Widget below the Post Grid.
-->
<div id="gw-blog-cta">
    <style>
        /* --- SCOPED CSS NAMESPACE --- */
        #gw-blog-cta {
            position: relative;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            padding: 80px 0;
            background-color: #27267d; /* Primary Blue */
            color: #ffffff;
            font-family: 'Lexend', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #gw-blog-cta * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Container */
        #gw-blog-cta .gw-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 5%;
            position: relative;
            z-index: 2;
        }

        /* Typography */
        #gw-blog-cta .gw-cta-icon {
            font-size: 32px;
            color: #D4AF37; /* Gold */
            margin-bottom: 24px;
        }

        #gw-blog-cta .gw-cta-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        @media (min-width: 768px) {
            #gw-blog-cta .gw-cta-title {
                font-size: 40px;
            }
        }

        #gw-blog-cta .gw-cta-subtitle {
            font-size: 16px;
            color: #e5eeff;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Form */
        #gw-blog-cta .gw-newsletter-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        @media (min-width: 640px) {
            #gw-blog-cta .gw-newsletter-form {
                flex-direction: row;
            }
        }

        #gw-blog-cta .gw-input {
            flex-grow: 1;
            padding: 16px 24px;
            border: 2px solid transparent;
            border-radius: 4px; /* Strict 4px Limit */
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        #gw-blog-cta .gw-input:focus {
            border-color: #D4AF37;
        }

        #gw-blog-cta .gw-btn-submit {
            background-color: #bb001b; /* Crimson Red */
            color: #ffffff;
            border: none;
            border-radius: 4px; /* Strict 4px Limit */
            padding: 16px 32px;
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        #gw-blog-cta .gw-btn-submit:hover {
            background-color: #e02830;
        }

        /* Decorative Elements */
        #gw-blog-cta .gw-deco-circle-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background-color: rgba(212, 175, 55, 0.05);
            z-index: 1;
        }

        #gw-blog-cta .gw-deco-circle-2 {
            position: absolute;
            bottom: -150px;
            right: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.03);
            z-index: 1;
        }
    </style>

    <!-- FontAwesome (Assumes Elementor has it loaded) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <div class="gw-deco-circle-1"></div>
    <div class="gw-deco-circle-2"></div>

    <div class="gw-container">
        <i class="fa-regular fa-envelope-open gw-cta-icon"></i>
        <h2 class="gw-cta-title">Don't Miss Out on Market Updates</h2>
        <p class="gw-cta-subtitle">Join over 5,000 investors receiving exclusive insights, property alerts, and expert analysis directly to their inbox.</p>
        
        <form class="gw-newsletter-form" onsubmit="event.preventDefault(); alert('Newsletter Subscription Sent!');">
            <input type="email" class="gw-input" placeholder="Enter your email address" required>
            <button type="submit" class="gw-btn-submit">Subscribe Now</button>
        </form>
    </div>
</div>
